[package]
name = "an-gatherers"
version = "0.1.4"
edition = "2024"

[[bin]]
name = "an-gatherers"
path = "src/main.rs"

[lib]
name = "an_gatherers"
path = "src/lib.rs"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
derive_more = { version = "1.0", features = ["from"] }
rand = "0.9"
getrandom = { version = "0.3", features = ["wasm_js"] }
wasm-bindgen = "0.2"
log = "0.4"

