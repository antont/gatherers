[dependencies.bevy]
version = "0.18"
default-features = false
features = [
  "default_app",        # Core app infrastructure (logging, diagnostics, etc.)
  "default_platform",   # Platform support (windowing, keyboard, mouse)
  "2d_api",             # 2D types (Sprite, Camera2d, etc.)
  "2d_bevy_render",     # 2D rendering backend
  "ui",                 # Bevy UI (nodes, text, layout)
  "webgl2",             # WebGL2 for broad WASM browser support
]

# Enable a small amount of optimization in debug mode
[profile.dev]
opt-level = 1

# Enable high optimizations for dependencies (incl. Bevy), but not for our code:
[profile.dev.package."*"]
opt-level = 3

[profile.release]
#from https://sycamore-rs.netlify.app/docs/v0.8/advanced/optimize_wasm_size
# Do not perform backtrace for panic on release builds.
panic = 'abort'
# Perform optimizations on all codegen units.
codegen-units = 1
# Optimize for size.
opt-level = 's' # or 'z' to optimize "aggressively" for size
# Enable link time optimization.
lto = true
